<html lang="en">
<head>
<meta charset="UTF-8">
<title>Speed Wifi</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:'Poppins', Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.top-right{
  position:fixed;
  top:16px;
  right:16px;
  text-align:right;
  font-size:13px;
  color:#ccc;
  line-height:1.4;
  background:rgba(0,0,0,0.7);
  padding:12px 16px;
  border-radius:8px;
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.1);
}

.top-right a{
  color:#4CAF50;
  text-decoration:none;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.top-right a:hover{
  text-decoration:underline;
}

.container{
  display:flex;
  align-items:center;
  gap:15px;
}

.value{
  font-size:90px;
  font-weight:700;
  opacity:0.4;
  transition:0.3s;
}

.unit{
  font-size:18px;
  color:#777;
  margin-top:-10px;
  opacity:0.4;
  transition:0.3s;
}

.btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.details{
  opacity: 0;
  transition: opacity 1s ease-in-out;
  margin-top: 20px;
  text-align: center;
  font-size: 14px;
}

.detail{
  margin: 5px 0;
}

.max{ color: #4CAF50; } /* green */
.avg{ color: #FF9800; } /* orange */
.min{ color: #F44336; } /* red */

.status{
  margin-top:10px;
  font-size:14px;
  color:#999;
  opacity:0.8;
}

#restart{ display:none; }
</style>
</head>

<body>

<div class="top-right">
  <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/User_icon_2.svg" width="16" height="16" alt="User" style="margin-right:6px;"> Creado por <strong>Kaizeen</strong><br>
  <img src="https://upload.wikimedia.org/wikipedia/fr/4/4f/Discord_Logo_sans_texte.svg" width="16" height="16" alt="Discord" style="margin-right:6px;"> Discord: <a href="https://discord.gg/SVFNQV95rb" target="_blank" rel="noopener noreferrer">SVFNQV95rb</a>
</div>

<div class="container">
  <div>
    <div class="value" id="val">0</div>
    <div class="unit" id="unit">bps</div>
    <div class="status" id="status">Iniciando prueba...</div>
    <div id="details" class="details">
      <div class="detail max">Velocidad máxima: <span id="maxSpeed"></span></div>
      <div class="detail avg">Velocidad promedio: <span id="avgSpeed"></span></div>
      <div class="detail min">Velocidad mínima: <span id="minSpeed"></span></div>
    </div>
  </div>

  <button class="btn" id="stop" onclick="stopTest()"><img src="https://img.icons8.com/ios-filled/50/ffffff/pause.png" width="24" height="24" alt="Pause"></button>
  <button class="btn" id="restart" onclick="startTest()"><img src="https://img.icons8.com/ios-filled/50/ffffff/play.png" width="24" height="24" alt="Play"></button>
</div>

<script>
let running = false;

let target = 0;
let current = 0;

let results = [];
let maxSpeed = 0;

let animateRunning = true; // 👈 control clave

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function format(bps){
  if(bps < 1000) return [bps.toFixed(0), "bps"];
  if(bps < 1e6) return [(bps/1000).toFixed(2), "Kbps"];
  if(bps < 1e9) return [(bps/1e6).toFixed(2), "Mbps"];
  return [(bps/1e9).toFixed(2), "Gbps"];
}

// smooth animation LOOP
function animate(){
  if(animateRunning){
    current += (target - current) * 0.1;
  }

  const f = format(current);

  document.getElementById("val").innerText = f[0];
  document.getElementById("unit").innerText = f[1];

  requestAnimationFrame(animate);
}
animate();

// measure - estrategia como speedtest.net con varios servidores de respaldo
async function measure(){
  const urls = [
    'https://download.thinkbroadband.com/20MB.zip',
    'https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg',
    'https://speed.hetzner.de/100MB.bin'
  ];

  for(const baseUrl of urls){
    const speed = await measureUrl(baseUrl);
    if(speed > 0){
      return speed;
    }
  }

  setStatus('No se pudo medir la velocidad. Comprueba tu conexión.');
  return 0;
}

async function measureUrl(url){
  try {
    const t0 = performance.now();
    const maxTime = 8000;
    const parallelCount = 3;
    const fetchOptions = { mode: 'cors', cache: 'no-store' };
    let totalBytes = 0;
    let round = 0;

    while(performance.now() - t0 < maxTime && round < 10){
      const promises = [];
      for(let i = 0; i < parallelCount; i++){
        promises.push(
          fetch(`${url}?cache=${Date.now()}_${i}`, fetchOptions)
            .then(res => {
              if(!res.ok) throw new Error('Failed ' + res.status);
              return res.blob();
            })
            .then(blob => {
              totalBytes += blob.size;
            })
            .catch(err => {
              console.warn('Descarga fallida:', err);
            })
        );
      }

      await Promise.all(promises);
      round++;
    }

    const t1 = performance.now();
    if(totalBytes === 0){
      return 0;
    }

    const bits = totalBytes * 8;
    const seconds = (t1 - t0)/1000;
    return bits / seconds;
  } catch (e) {
    console.error('Error en measureUrl():', e);
    return 0;
  }
}

// loop
async function loop(){
  while(running){

    let speed = await measure();

    if(document.getElementById("stop").style.display === "none"){
      document.getElementById("stop").style.display = "flex";
    }

    results.push(speed);

    if(speed > maxSpeed){
      maxSpeed = speed;
    }

    // mantiene el valor más alto visible mientras sigue buscando
    target = Math.max(maxSpeed, speed);

    await new Promise(r => setTimeout(r, 400));
  }
}

// start
function startTest(){
  running = true;

  results = [];
  maxSpeed = 0;

  target = 0;
  current = 0;

  animateRunning = true; // 👈 reactivar animación

  setStatus('Midiendo velocidad...');

  document.getElementById("val").style.opacity = "0";
  document.getElementById("unit").style.opacity = "0";

  document.getElementById("details").style.display = "none";
  document.getElementById("details").style.opacity = "0";

  document.getElementById("stop").style.display = "none";
  document.getElementById("restart").style.display = "none";

  loop();

  // animate entrance
  setTimeout(() => {
    document.getElementById("val").style.opacity = "0.4";
    document.getElementById("unit").style.opacity = "0.4";
  }, 100);

  setTimeout(()=>{
    if(running) stopTest();
  },13000);
}

// stop (IMPORTANT FIX)
function stopTest(){
  running = false;

  // 🔥 STOP ANIMATION COMPLETELY
  animateRunning = false;

  // lock final value instantly
  target = maxSpeed;
  current = maxSpeed;

  const f = format(maxSpeed);

  document.getElementById("val").innerText = f[0];
  document.getElementById("unit").innerText = f[1];

  document.getElementById("val").style.opacity = "1";
  document.getElementById("unit").style.opacity = "1";

  document.getElementById("stop").style.display = "none";
  document.getElementById("restart").style.display = "flex";

  if(results.length === 0 || maxSpeed === 0){
    setStatus('No se detectó velocidad. Intenta abrir el archivo en un servidor local o revisa tu conexión.');
  } else {
    setStatus('');
  }

  // calculate details
  let max = results.length ? Math.max(...results) : 0;
  let min = results.length ? Math.min(...results) : 0;
  let avg = results.length ? results.reduce((a,b)=>a+b,0)/results.length : 0;

  // format and set
  document.getElementById("maxSpeed").innerText = format(max)[0] + " " + format(max)[1];
  document.getElementById("avgSpeed").innerText = format(avg)[0] + " " + format(avg)[1];
  document.getElementById("minSpeed").innerText = format(min)[0] + " " + format(min)[1];

  // show details with animation
  let details = document.getElementById("details");
  details.style.display = "block";
  setTimeout(() => {
    details.style.opacity = "1";
  }, 100);
}

// auto start when page is ready
window.addEventListener('DOMContentLoaded', startTest);
</script>

</body>
</html>
